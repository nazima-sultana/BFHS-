<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Question Paper Creator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & React DOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar elimination for pure dashboard layout */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Styling the paper sheet in live preview */
        .a4-page {
            background: white;
            min-height: 297mm;
            padding: 20mm;
            box-sizing: border-box;
            border-radius: 0.375rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        @media print {
            body {
                background-color: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .no-print, .no-print * {
                display: none !important;
            }
            .print-area {
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
                border: none !important;
                display: block !important;
            }
            .a4-page {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                min-height: auto !important;
            }
            .avoid-break {
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Clean SVG Icon Library
        const Icons = {
            Trash: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
            ),
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            ),
            Save: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />
                </svg>
            ),
            Download: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                </svg>
            ),
            Share: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
                </svg>
            ),
            Print: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.617 0-1.11-.51-1.07-1.127L6.34 18m11.32 0h-11.32m0 0l-.43-4.73m12.18 4.73l.43-4.73M6.678 11.23a.75.75 0 01.458-.832L12 8.25l4.864 2.148a.75.75 0 01.458.832L16.5 15h-9L6.678 11.23zM10.5 11.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z" />
                </svg>
            ),
            Clear: () => (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" class="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            )
        };

        // Standard Demo Data to avoid starting entirely empty
        const initialPaper = {
            id: "demo_paper_" + Date.now(),
            schoolName: "Springdale International School",
            examType: "SA1",
            className: "Class V",
            subject: "General Sciences & English",
            date: "2026-07-06",
            maxMarks: "50",
            duration: "2.5 Hours",
            sections: {
                A: [
                    {
                        id: "demo_q1",
                        type: "mcq",
                        text: "Which planet is known as the Red Planet?",
                        marks: 2,
                        options: ["Venus", "Mars", "Jupiter", "Saturn"]
                    },
                    {
                        id: "demo_q2",
                        type: "fill",
                        text: "The process of water turning into water vapor is called ____________.",
                        marks: 1
                    }
                ],
                B: [
                    {
                        id: "demo_q3",
                        type: "matching",
                        text: "Match the following plants with their correct natural habitats:",
                        marks: 5,
                        matchingPairs: [
                            { id: "m1", left: "Cactus", right: "Desert" },
                            { id: "m2", left: "Water Lily", right: "Pond" },
                            { id: "m3", left: "Pine Tree", right: "Mountains" },
                            { id: "m4", left: "Mango Tree", right: "Plains" }
                        ]
                    },
                    {
                        id: "demo_q4",
                        type: "trace",
                        text: "Save water, save life.",
                        marks: 2,
                        traceText: "Save water, save life."
                    }
                ],
                C: [
                    {
                        id: "demo_q5",
                        type: "puzzle",
                        text: "Find the names of farm animals in the grid below:",
                        marks: 5,
                        puzzleRows: 6,
                        puzzleCols: 6,
                        puzzleGrid: [
                            ['C', 'O', 'W', 'X', 'Y', 'Z'],
                            ['G', 'O', 'A', 'T', 'A', 'B'],
                            ['H', 'E', 'N', 'P', 'Q', 'R'],
                            ['S', 'H', 'E', 'E', 'P', 'W'],
                            ['P', 'I', 'G', 'D', 'O', 'G'],
                            ['X', 'Y', 'Z', 'U', 'V', 'W']
                        ],
                        puzzleWords: "COW, GOAT, HEN, SHEEP, PIG, DOG"
                    },
                    {
                        id: "demo_q6",
                        type: "jumbled",
                        text: "Unscramble the letters to form a meaningful word:",
                        marks: 2,
                        jumbledText: "SCIENCE"
                    }
                ]
            }
        };

        function App() {
            const [paper, setPaper] = useState(initialPaper);
            const [savedPapers, setSavedPapers] = useState([]);
            const [activeTab, setActiveTab] = useState('edit'); // 'edit', 'preview' (mobile optimized)
            const [activeSection, setActiveSection] = useState('A'); // Active section inside editor

            // Load saved papers from localStorage on mount
            useEffect(() => {
                const stored = localStorage.getItem('school_papers');
                if (stored) {
                    try {
                        setSavedPapers(JSON.parse(stored));
                    } catch (e) {
                        console.error('Error parsing stored papers', e);
                    }
                }
            }, []);

            // Auto-calculate Total Marks
            const calculateTotalMarks = () => {
                let total = 0;
                Object.keys(paper.sections).forEach(secId => {
                    paper.sections[secId].forEach(q => {
                        total += Number(q.marks || 0);
                    });
                });
                return total;
            };

            // Header state updates
            const handleHeaderChange = (field, val) => {
                setPaper(prev => ({ ...prev, [field]: val }));
            };

            // Section Specific Updates
            const handleAddQuestion = (sectionId) => {
                const newQ = {
                    id: 'q_' + Date.now() + Math.random().toString(36).substr(2, 4),
                    type: 'mcq',
                    text: 'Type your question here',
                    marks: 1,
                    options: ['', '', '', ''],
                    matchingPairs: [{ id: 'm1', left: '', right: '' }],
                    puzzleRows: 5,
                    puzzleCols: 5,
                    puzzleGrid: Array(5).fill(null).map(() => Array(5).fill('')),
                    puzzleWords: '',
                    image: null,
                    traceText: '',
                    jumbledText: ''
                };

                setPaper(prev => ({
                    ...prev,
                    sections: {
                        ...prev.sections,
                        [sectionId]: [...prev.sections[sectionId], newQ]
                    }
                }));
            };

            const handleDeleteQuestion = (sectionId, qId) => {
                if (confirm('Are you sure you want to delete this question?')) {
                    setPaper(prev => ({
                        ...prev,
                        sections: {
                            ...prev.sections,
                            [sectionId]: prev.sections[sectionId].filter(q => q.id !== qId)
                        }
                    }));
                }
            };

            const updateQuestion = (sectionId, qId, field, value) => {
                setPaper(prev => {
                    const questions = [...prev.sections[sectionId]];
                    const index = questions.findIndex(q => q.id === qId);
                    if (index > -1) {
                        questions[index] = { ...questions[index], [field]: value };
                    }
                    return {
                        ...prev,
                        sections: { ...prev.sections, [sectionId]: questions }
                    };
                });
            };

            // Image Handler (converts to base64)
            const handleImageUpload = (e, sectionId, qId) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        updateQuestion(sectionId, qId, 'image', reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Word Puzzle Grid Resizer helper
            const handleGridResize = (sectionId, qId, newRows, newCols) => {
                const r = Math.max(1, Math.min(10, parseInt(newRows) || 5));
                const c = Math.max(1, Math.min(10, parseInt(newCols) || 5));

                setPaper(prev => {
                    const questions = [...prev.sections[sectionId]];
                    const index = questions.findIndex(q => q.id === qId);
                    if (index > -1) {
                        const oldGrid = questions[index].puzzleGrid || [];
                        const grid = Array(r).fill(null).map((_, rIdx) => {
                            return Array(c).fill(null).map((_, cIdx) => {
                                return (oldGrid[rIdx] && oldGrid[rIdx][cIdx]) || '';
                            });
                        });
                        questions[index] = {
                            ...questions[index],
                            puzzleRows: r,
                            puzzleCols: c,
                            puzzleGrid: grid
                        };
                    }
                    return {
                        ...prev,
                        sections: { ...prev.sections, [sectionId]: questions }
                    };
                });
            };

            const handleGridCellChange = (sectionId, qId, rIndex, cIndex, value) => {
                const char = value.toUpperCase().slice(0, 1);
                setPaper(prev => {
                    const questions = [...prev.sections[sectionId]];
                    const index = questions.findIndex(q => q.id === qId);
                    if (index > -1) {
                        const grid = [...questions[index].puzzleGrid];
                        grid[rIndex] = [...grid[rIndex]];
                        grid[rIndex][cIndex] = char;
                        questions[index] = { ...questions[index], puzzleGrid: grid };
                    }
                    return {
                        ...prev,
                        sections: { ...prev.sections, [sectionId]: questions }
                    };
                });
            };

            // Matching Pairs Helpers
            const handleMatchingPairChange = (sectionId, qId, pairId, field, value) => {
                setPaper(prev => {
                    const questions = [...prev.sections[sectionId]];
                    const index = questions.findIndex(q => q.id === qId);
                    if (index > -1) {
                        const pairs = questions[index].matchingPairs.map(p => {
                            if (p.id === pairId) return { ...p, [field]: value };
                            return p;
                        });
                        questions[index] = { ...questions[index], matchingPairs: pairs };
                    }
                    return {
                        ...prev,
                        sections: { ...prev.sections, [sectionId]: questions }
                    };
                });
            };

            const addMatchingRow = (sectionId, qId) => {
                setPaper(prev => {
                    const questions = [...prev.sections[sectionId]];
                    const index = questions.findIndex(q => q.id === qId);
                    if (index > -1) {
                        const pairs = [...questions[index].matchingPairs, { id: 'm_' + Date.now(), left: '', right: '' }];
                        questions[index] = { ...questions[index], matchingPairs: pairs };
                    }
                    return {
                        ...prev,
                        sections: { ...prev.sections, [sectionId]: questions }
                    };
                });
            };

            const deleteMatchingRow = (sectionId, qId, pairId) => {
                setPaper(prev => {
                    const questions = [...prev.sections[sectionId]];
                    const index = questions.findIndex(q => q.id === qId);
                    if (index > -1) {
                        const pairs = questions[index].matchingPairs.filter(p => p.id !== pairId);
                        questions[index] = { ...questions[index], matchingPairs: pairs };
                    }
                    return {
                        ...prev,
                        sections: { ...prev.sections, [sectionId]: questions }
                    };
                });
            };

            // Stable jumbling function using character mapping
            const getJumbledWord = (word) => {
                if (!word) return 'WORD';
                const chars = word.toUpperCase().replace(/\s/g, '').split('');
                return chars.sort((a, b) => (a.charCodeAt(0) * 3 + 7) % 10 - (b.charCodeAt(0) * 3 + 7) % 10).join('  ');
            };

            // Stable deterministic Scramble for matching column
            const getScrambledPairs = (pairs) => {
                const leftItems = pairs.map(p => p.left);
                const rightItems = [...pairs].map(p => p.right).sort();
                return { leftItems, rightItems };
            };

            // LocalStorage Save & Append-only
            const handleSave = () => {
                const updatedPaper = {
                    ...paper,
                    id: paper.id.startsWith('demo') ? 'paper_' + Date.now() : paper.id,
                    savedAt: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString()
                };

                const currentPapers = JSON.parse(localStorage.getItem('school_papers') || '[]');
                currentPapers.push(updatedPaper); // Append only
                
                localStorage.setItem('school_papers', JSON.stringify(currentPapers));
                setSavedPapers(currentPapers);
                setPaper(updatedPaper);
                alert('Draft appended and saved successfully to browser storage!');
            };

            const handleLoad = (targetPaper) => {
                if (confirm(`Do you want to load "${targetPaper.schoolName || 'Untitled'} - ${targetPaper.subject}"? Any unsaved edits will be lost.`)) {
                    setPaper(targetPaper);
                }
            };

            const handleDeleteSaved = (e, targetId) => {
                e.stopPropagation();
                if (confirm('Are you sure you want to permanently delete this saved paper?')) {
                    const currentPapers = JSON.parse(localStorage.getItem('school_papers') || '[]');
                    const filtered = currentPapers.filter(p => p.id !== targetId);
                    localStorage.setItem('school_papers', JSON.stringify(filtered));
                    setSavedPapers(filtered);
                }
            };

            // Clear Current Draft
            const handleClearCurrent = () => {
                if (confirm('Clear current workspace? This will reset your progress on this paper. Unsaved drafts are lost.')) {
                    setPaper({
                        id: 'paper_' + Date.now(),
                        schoolName: '',
                        examType: 'FA1',
                        className: '',
                        subject: '',
                        date: '',
                        maxMarks: '',
                        duration: '',
                        sections: { A: [], B: [], C: [] }
                    });
                }
            };

            // Download JSON file
            const handleDownloadJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(paper, null, 2));
                const anchor = document.createElement('a');
                anchor.setAttribute("href", dataStr);
                anchor.setAttribute("download", `${paper.subject.replace(/\s+/g, '_') || 'question_paper'}.json`);
                document.body.appendChild(anchor);
                anchor.click();
                anchor.remove();
            };

            // Navigator Share API with Copy fallback
            const handleShare = async () => {
                const summary = `${paper.schoolName || 'School Exam'}\nSubject: ${paper.subject || 'Exam'}\nClass: ${paper.className || 'N/A'}\nMarks: ${paper.maxMarks || 'N/A'}`;
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: paper.schoolName || 'Question Paper',
                            text: summary,
                            url: window.location.href
                        });
                    } catch (err) {
                        console.log('Share canceled or failed', err);
                    }
                } else {
                    await navigator.clipboard.writeText(JSON.stringify(paper, null, 2));
                    alert('Copied entire raw paper JSON schema to clipboard! (Share API unsupported in this environment)');
                }
            };

            return (
                <div className="min-h-screen flex flex-col print:bg-white">
                    
                    {/* TOP NAVBAR (Hidden during Printing) */}
                    <header className="no-print sticky top-0 bg-slate-900 text-white z-50 border-b border-slate-800 shadow-md">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-4">
                            <div className="flex items-center gap-2">
                                <span className="text-xl">📜</span>
                                <h1 className="font-semibold text-lg tracking-tight">School Paper Creator</h1>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-2">
                                <button onClick={handleSave} className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded text-sm transition">
                                    <Icons.Save /> <span>Save Draft</span>
                                </button>
                                <button onClick={handleClearCurrent} className="flex items-center gap-1.5 px-3 py-1.5 bg-amber-600 hover:bg-amber-500 rounded text-sm transition">
                                    <Icons.Clear /> <span>Clear Current</span>
                                </button>
                                <button onClick={handleDownloadJSON} className="flex items-center gap-1.5 px-3 py-1.5 bg-teal-600 hover:bg-teal-500 rounded text-sm transition">
                                    <Icons.Download /> <span>JSON</span>
                                </button>
                                <button onClick={handleShare} className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded text-sm transition">
                                    <Icons.Share /> <span>Share</span>
                                </button>
                                <button onClick={() => window.print()} className="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded text-sm transition font-medium">
                                    <Icons.Print /> <span>Print / PDF</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* MOBILE TOGGLE SELECTOR (Hidden during Printing) */}
                    <div className="no-print md:hidden flex border-b border-slate-200 bg-white">
                        <button 
                            onClick={() => setActiveTab('edit')} 
                            className={`flex-1 py-3 text-center font-medium border-b-2 ${activeTab === 'edit' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500'}`}
                        >
                            ✏️ Editor
                        </button>
                        <button 
                            onClick={() => setActiveTab('preview')} 
                            className={`flex-1 py-3 text-center font-medium border-b-2 ${activeTab === 'preview' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500'}`}
                        >
                            👁️ Live Preview
                        </button>
                    </div>

                    {/* CORE APP LAYOUT */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-6 items-start print:block print:p-0">
                        
                        {/* LEFT COLUMN: EDITING INTERFACE */}
                        <section className={`no-print space-y-6 ${activeTab === 'edit' ? 'block' : 'hidden md:block'}`}>
                            
                            {/* GENERAL SETTINGS */}
                            <div
